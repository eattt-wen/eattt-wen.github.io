<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>辛巴 · Simba</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f8f3ec;
  --sand:#ede0cc;
  --caramel:#c4a07a;
  --seal:#6b4226;
  --dark:#2e1a0e;
  --blue:#7aa8c4;
  --blue-lt:#d4e8f4;
  --tx:#2e1a0e;
  --tm:#7a5a3a;
  --tl:#b89a78;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--cream);color:var(--tx);min-height:100vh}

/* TOP BAR */
.top-bar{background:var(--dark);padding:12px 40px;display:flex;align-items:center;justify-content:space-between}
.top-bar a{font-size:13px;font-weight:500;color:var(--caramel);text-decoration:none;letter-spacing:.08em;transition:.18s}
.top-bar a:hover{color:white}
.top-bar-title{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.35);font-weight:300}

/* HERO */
.hero{display:grid;grid-template-columns:1fr 1fr;min-height:500px}
.hero-left{background:var(--seal);padding:64px 56px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.hero-left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 110% 110%,rgba(196,160,122,.18) 0%,transparent 60%),radial-gradient(ellipse 50% 80% at -20% 50%,rgba(255,255,255,.04) 0%,transparent 50%)}
.hero-eyeline{display:flex;align-items:center;gap:8px;margin-bottom:24px;position:relative;z-index:1}
.hero-eye{width:13px;height:13px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px rgba(122,168,196,.28),0 0 16px rgba(122,168,196,.35)}
.hero-eye-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--caramel);font-weight:300;margin-left:4px}
.hero-name{font-family:'Playfair Display',serif;font-size:76px;font-weight:700;color:white;line-height:1;margin-bottom:4px;position:relative;z-index:1}
.hero-name-en{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--caramel);font-weight:300;margin-bottom:32px;position:relative;z-index:1}
.hero-desc{font-size:14px;color:rgba(255,255,255,.68);line-height:2.2;font-weight:300;border-left:2px solid var(--caramel);padding-left:16px;position:relative;z-index:1}
.hero-right{position:relative;overflow:hidden;background:var(--sand)}
.hero-right img{width:100%;height:100%;object-fit:cover;display:block}
.hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px}

/* WRAP */
.wrap{max-width:1040px;margin:0 auto;padding:0 32px 80px}

/* PROFILE STRIP */
.profile-strip{display:flex;background:white;border:1px solid var(--sand);border-radius:0 0 14px 14px;overflow:hidden;margin-bottom:52px;box-shadow:0 4px 20px rgba(46,26,14,.06)}
.pstat{flex:1;padding:18px 22px;border-right:1px solid var(--sand);transition:background .18s}
.pstat:last-child{border-right:none}
.pstat:hover{background:var(--cream)}
.pstat-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--tl);font-weight:500;margin-bottom:5px}
.pstat-val{font-size:14px;font-weight:700;color:var(--tx);line-height:1.4}
.pstat-sub{font-size:11px;color:var(--tm);margin-top:2px}

/* SECTION HEADER */
.sec-hd{display:flex;align-items:baseline;gap:16px;margin-bottom:24px}
.sec-hd-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--seal)}
.sec-hd-line{flex:1;height:1px;background:var(--sand)}
.sec-hd-count{font-size:12px;letter-spacing:.1em;color:var(--tl)}

/* PHOTO GRID */
.album{margin-top:44px}
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:190px;gap:7px}
.photo-item{overflow:hidden;border-radius:8px;cursor:pointer;position:relative;background:var(--sand)}
.photo-item.tall{grid-row:span 2}
.photo-item.wide{grid-column:span 2}
.photo-item.big{grid-column:span 2;grid-row:span 2}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
.photo-item:hover img{transform:scale(1.07)}
.photo-item::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(46,26,14,.32) 0%,transparent 55%);opacity:0;transition:opacity .3s}
.photo-item:hover::after{opacity:1}
.photo-zoom{position:absolute;bottom:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.88);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transform:translateY(4px);transition:opacity .28s,transform .28s;z-index:2}
.photo-item:hover .photo-zoom{opacity:1;transform:translateY(0)}

/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;background:rgba(16,6,2,.92);z-index:999;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
#lb.on{display:flex}
#lb-inner{max-width:820px;width:100%;display:flex;flex-direction:column;align-items:center;cursor:default}
#lb-img{max-width:100%;max-height:80vh;border-radius:8px;object-fit:contain;display:block;box-shadow:0 24px 80px rgba(0,0,0,.65)}
#lb-nav{display:flex;align-items:center;gap:20px;margin-top:18px}
.lb-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s;font-family:inherit}
.lb-btn:hover{background:rgba(255,255,255,.2)}
#lb-counter{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.12em;min-width:50px;text-align:center}
#lb-close-btn{position:fixed;top:18px;right:22px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s;z-index:1000}
#lb-close-btn:hover{background:rgba(255,255,255,.18)}

/* EYE DIVIDER */
.eye-divider{display:flex;align-items:center;gap:12px;margin:48px 0 0}
.eye-divider::before,.eye-divider::after{content:'';flex:1;height:1px;background:var(--sand)}
.eye-gem{width:9px;height:9px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px var(--blue-lt)}

/* FOOTER */
.footer-strip{background:var(--dark);padding:26px 40px;display:flex;align-items:center;justify-content:space-between;margin-top:56px}
.footer-left{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:.06em}
.footer-left strong{color:var(--caramel)}
.footer-strip a{font-size:13px;color:var(--caramel);text-decoration:none;letter-spacing:.06em;transition:.18s}
.footer-strip a:hover{color:white}

@media(max-width:800px){
  .hero{grid-template-columns:1fr}
  .hero-right{height:280px}
  .hero-name{font-size:56px}
  .photo-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:155px}
  .photo-item.big,.photo-item.wide{grid-column:span 2}
  .profile-strip{flex-wrap:wrap}
  .pstat{min-width:50%;border-bottom:1px solid var(--sand)}
  .top-bar,.footer-strip{padding:12px 20px}
  .wrap{padding:0 16px 60px}
  .hero-left{padding:44px 28px}
}
@media(max-width:480px){
  .photo-grid{grid-auto-rows:130px}
}
</style>
</head>
<body>

<!-- LIGHTBOX -->
<div id="lb" onclick="closeLb()">
  <div id="lb-close-btn" onclick="closeLb()">✕</div>
  <div id="lb-inner" onclick="event.stopPropagation()">
    <img id="lb-img" src="" alt="辛巴"/>
    <div id="lb-nav">
      <button class="lb-btn" onclick="lbStep(-1)">‹</button>
      <div id="lb-counter">1 / 13</div>
      <button class="lb-btn" onclick="lbStep(1)">›</button>
    </div>
  </div>

<script>
var PHOTOS=[
  'xinba_web/1.jpg','xinba_web/2.jpg','xinba_web/IMG_1209.jpg',
  'xinba_web/IMG_3186.jpg','xinba_web/IMG_6202.jpg','xinba_web/IMG_6473.jpg',
  'xinba_web/IMG_6977.jpg','xinba_web/IMG_6980.jpg','xinba_web/IMG_6983.jpg',
  'xinba_web/IMG_7019.jpg','xinba_web/IMG_7020.jpg','xinba_web/IMG_8810.jpg',
  'xinba_web/IMG_9788.jpg'
];
var cur=0;
function openLb(i){cur=i;update();document.getElementById('lb').classList.add('on')}
function closeLb(){document.getElementById('lb').classList.remove('on')}
function lbStep(d){cur=(cur+d+PHOTOS.length)%PHOTOS.length;update()}
function update(){
  document.getElementById('lb-img').src=PHOTOS[cur];
  document.getElementById('lb-counter').textContent=(cur+1)+' / '+PHOTOS.length;
}
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lb').classList.contains('on'))return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')lbStep(-1);
  if(e.key==='ArrowRight')lbStep(1);
});
</script>
