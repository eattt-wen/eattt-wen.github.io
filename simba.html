<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>辛巴 · Simba</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f8f3ec;
  --sand:#ede0cc;
  --caramel:#c4a07a;
  --seal:#6b4226;
  --dark:#2e1a0e;
  --blue:#7aa8c4;
  --blue-lt:#d4e8f4;
  --tx:#2e1a0e;
  --tm:#7a5a3a;
  --tl:#b89a78;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--cream);color:var(--tx);min-height:100vh}

.top-bar{background:var(--dark);padding:12px 40px;display:flex;align-items:center;justify-content:space-between}
.top-bar a{font-size:13px;font-weight:500;color:var(--caramel);text-decoration:none;letter-spacing:.08em;transition:.18s}
.top-bar a:hover{color:white}
.top-bar-title{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.35);font-weight:300}

.hero{display:grid;grid-template-columns:1fr 1fr;min-height:500px}
.hero-left{background:var(--seal);padding:64px 56px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.hero-left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 110% 110%,rgba(196,160,122,.18) 0%,transparent 60%),radial-gradient(ellipse 50% 80% at -20% 50%,rgba(255,255,255,.04) 0%,transparent 50%)}
.hero-eyeline{display:flex;align-items:center;gap:8px;margin-bottom:24px;position:relative;z-index:1}
.hero-eye{width:13px;height:13px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px rgba(122,168,196,.28),0 0 16px rgba(122,168,196,.35)}
.hero-eye-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--caramel);font-weight:300;margin-left:4px}
.hero-name{font-family:'Playfair Display',serif;font-size:76px;font-weight:700;color:white;line-height:1;margin-bottom:4px;position:relative;z-index:1}
.hero-name-en{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--caramel);font-weight:300;margin-bottom:32px;position:relative;z-index:1}
.hero-desc{font-size:14px;color:rgba(255,255,255,.68);line-height:2.2;font-weight:300;border-left:2px solid var(--caramel);padding-left:16px;position:relative;z-index:1}
.hero-right{position:relative;overflow:hidden;background:var(--sand)}
.hero-right img{width:100%;height:100%;object-fit:cover;display:block}
.hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px}

.wrap{max-width:1040px;margin:0 auto;padding:40px 32px 80px}

.sec-hd{display:flex;align-items:baseline;gap:16px;margin-bottom:32px}
.sec-hd-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--seal)}
.sec-hd-line{flex:1;height:1px;background:var(--sand)}
.sec-hd-count{font-size:12px;letter-spacing:.1em;color:var(--tl)}

/* ── MASONRY ── */
#masonry-wrap{position:relative}

.m-item{
  position:absolute;
  overflow:hidden;
  border-radius:12px;
  cursor:pointer;
  background:var(--sand);
  opacity:0;
  transform:translateY(12px);
  transition:opacity .5s ease, transform .5s ease, box-shadow .3s ease;
}
.m-item.visible{opacity:1;transform:translateY(0)}
.m-item:hover{box-shadow:0 8px 32px rgba(46,26,14,.18)}

.m-item img{
  width:100%;display:block;
  transition:transform .55s cubic-bezier(.25,.46,.45,.94);
}
.m-item:hover img{transform:scale(1.06)}

.m-ov{
  position:absolute;inset:0;
  background:linear-gradient(170deg,transparent 35%,rgba(46,26,14,.52) 100%);
  opacity:0;transition:opacity .3s;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:12px 14px;
}
.m-item:hover .m-ov{opacity:1}

.m-ov-num{
  font-size:10px;letter-spacing:.18em;
  color:rgba(255,255,255,.6);font-weight:300;
}
.m-ov-btn{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.88);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--seal);
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  transition:transform .2s;
}
.m-item:hover .m-ov-btn{transform:scale(1.12)}

/* shimmer skeleton */
.m-item.skel{
  background:linear-gradient(90deg,var(--sand) 25%,#f3ead9 50%,var(--sand) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;background:rgba(14,5,1,.95);z-index:999;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
#lb.on{display:flex}
#lb-inner{max-width:900px;width:100%;display:flex;flex-direction:column;align-items:center;cursor:default}
#lb-img{
  max-width:100%;max-height:82vh;
  border-radius:10px;object-fit:contain;display:block;
  box-shadow:0 32px 100px rgba(0,0,0,.8);
  transition:opacity .2s ease;
}
#lb-img.fade{opacity:0}
#lb-nav{display:flex;align-items:center;gap:22px;margin-top:20px}
.lb-btn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:white;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.18s;font-family:inherit;user-select:none;
}
.lb-btn:hover{background:rgba(255,255,255,.22);transform:scale(1.08)}
#lb-counter{font-size:11px;color:rgba(255,255,255,.36);letter-spacing:.18em;min-width:56px;text-align:center}
#lb-close{
  position:fixed;top:18px;right:22px;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
  color:white;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.18s;z-index:1000;
}
#lb-close:hover{background:rgba(255,255,255,.2)}

.eye-divider{display:flex;align-items:center;gap:12px;margin:56px 0 0}
.eye-divider::before,.eye-divider::after{content:'';flex:1;height:1px;background:var(--sand)}
.eye-gem{width:9px;height:9px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px var(--blue-lt)}

.footer-strip{background:var(--dark);padding:26px 40px;display:flex;align-items:center;justify-content:space-between;margin-top:56px}
.footer-left{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:.06em}
.footer-left strong{color:var(--caramel)}
.footer-strip a{font-size:13px;color:var(--caramel);text-decoration:none;letter-spacing:.06em;transition:.18s}
.footer-strip a:hover{color:white}

@media(max-width:800px){
  .hero{grid-template-columns:1fr}
  .hero-right{height:280px}
  .hero-name{font-size:56px}
  .top-bar,.footer-strip{padding:12px 20px}
  .wrap{padding:24px 16px 60px}
  .hero-left{padding:44px 28px}
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html">← 返回主页</a>
  <div class="top-bar-title">Simba · Siamese · 10 yrs</div>
  <span></span>
</div>

<div class="hero">
  <div class="hero-left">
    <div class="hero-eyeline">
      <div class="hero-eye"></div>
      <div class="hero-eye" style="margin-left:-2px"></div>
      <span class="hero-eye-label">Siamese · 10 years old</span>
    </div>
    <div class="hero-name">辛巴</div>
    <div class="hero-name-en">Simba</div>
    <div class="hero-desc">
      最喜欢吃猫条<br/>
      最爱玩纸团<br/>
      特别爱睡觉<br/>
      打架很凶
    </div>
  </div>
  <div class="hero-right">
    <img src="xinba_web/IMG_9788.jpg" alt="辛巴"
         onerror="this.outerHTML='<div class=\'hero-ph\'>🐱</div>'"/>
  </div>
</div>

<div class="wrap">
  <div class="sec-hd">
    <div class="sec-hd-title">相册</div>
    <div class="sec-hd-line"></div>
    <div class="sec-hd-count">13 张</div>
  </div>

  <div id="masonry-wrap"></div>

  <div class="eye-divider"><div class="eye-gem"></div></div>
</div>

<div class="footer-strip">
  <div class="footer-left"><strong>辛巴</strong> · 永远是最好的猫 🐾</div>
  <a href="index.html">← 返回钧文的主页</a>
</div>

<div id="lb" onclick="closeLb()">
  <div id="lb-close" onclick="closeLb()">✕</div>
  <div id="lb-inner" onclick="event.stopPropagation()">
    <img id="lb-img" src="" alt="辛巴"/>
    <div id="lb-nav">
      <button class="lb-btn" onclick="lbStep(-1)">‹</button>
      <div id="lb-counter">1 / 13</div>
      <button class="lb-btn" onclick="lbStep(1)">›</button>
    </div>
  </div>
</div>

<script>
var PHOTOS = [
  'xinba_web/1.jpg','xinba_web/2.jpg','xinba_web/IMG_1209.jpg',
  'xinba_web/IMG_3186.jpg','xinba_web/IMG_6202.jpg','xinba_web/IMG_6473.jpg',
  'xinba_web/IMG_6977.jpg','xinba_web/IMG_6980.jpg','xinba_web/IMG_6983.jpg',
  'xinba_web/IMG_7019.jpg','xinba_web/IMG_7020.jpg','xinba_web/IMG_8810.jpg',
  'xinba_web/IMG_9788.jpg'
];

var GAP = 10;
var wrap = document.getElementById('masonry-wrap');
var items = [];

function numCols(){
  var w = wrap.offsetWidth;
  if(w < 480) return 2;
  if(w < 720) return 3;
  return 4;
}

function layout(){
  var cols = numCols();
  var totalW = wrap.offsetWidth;
  var colW = (totalW - GAP*(cols-1)) / cols;
  var heights = [];
  for(var c=0;c<cols;c++) heights[c]=0;

  items.forEach(function(o){
    // shortest column
    var col=0;
    for(var c=1;c<cols;c++) if(heights[c]<heights[col]) col=c;

    var x = col*(colW+GAP);
    var y = heights[col];
    var imgH = o.nw ? Math.round(colW * o.nh / o.nw) : Math.round(colW * 0.75);

    o.el.style.left  = x + 'px';
    o.el.style.top   = y + 'px';
    o.el.style.width = colW + 'px';
    o.img.style.height = imgH + 'px';
    o.img.style.objectFit = 'cover';

    heights[col] += imgH + GAP;
  });

  wrap.style.height = (Math.max.apply(null,heights) - GAP) + 'px';
}

function buildGallery(){
  wrap.innerHTML = '';
  items = [];

  PHOTOS.forEach(function(src, i){
    var el  = document.createElement('div');
    el.className = 'm-item skel';

    var img = document.createElement('img');
    img.alt = '辛巴';

    var ov  = document.createElement('div');
    ov.className = 'm-ov';
    ov.innerHTML =
      '<span class="m-ov-num">'+String(i+1).padStart(2,'0')+' / '+PHOTOS.length+'</span>'+
      '<div class="m-ov-btn">⊕</div>';

    el.appendChild(img);
    el.appendChild(ov);
    el.addEventListener('click',(function(idx){return function(){openLb(idx)}})(i));
    wrap.appendChild(el);

    var o = {el:el, img:img, nw:0, nh:0};
    items.push(o);

    img.onload = (function(obj, imgEl, elem){
      return function(){
        obj.nw = imgEl.naturalWidth  || 4;
        obj.nh = imgEl.naturalHeight || 3;
        elem.classList.remove('skel');
        layout();
        setTimeout(function(){ elem.classList.add('visible'); }, i*35);
      };
    })(o, img, el);

    img.onerror = (function(elem){
      return function(){ elem.style.display='none'; layout(); };
    })(el);

    img.src = src;
  });

  layout();
}

window.addEventListener('load', buildGallery);
window.addEventListener('resize', layout);

/* lightbox */
var cur = 0;
var lbImg = document.getElementById('lb-img');

function openLb(i){
  cur = i;
  lbImg.classList.remove('fade');
  lbImg.src = PHOTOS[cur];
  document.getElementById('lb-counter').textContent = (cur+1)+' / '+PHOTOS.length;
  document.getElementById('lb').classList.add('on');
}
function closeLb(){ document.getElementById('lb').classList.remove('on'); }
function lbStep(d){
  lbImg.classList.add('fade');
  setTimeout(function(){
    cur = (cur+d+PHOTOS.length)%PHOTOS.length;
    lbImg.src = PHOTOS[cur];
    document.getElementById('lb-counter').textContent = (cur+1)+' / '+PHOTOS.length;
    lbImg.classList.remove('fade');
  }, 180);
}
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lb').classList.contains('on')) return;
  if(e.key==='Escape')     closeLb();
  if(e.key==='ArrowLeft')  lbStep(-1);
  if(e.key==='ArrowRight') lbStep(1);
});
</script>
</body>
</html>
