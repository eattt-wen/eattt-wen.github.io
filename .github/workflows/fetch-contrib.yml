name: Fetch GitHub Contributions

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 自动跑（北京时间 10:00）
  workflow_dispatch:        # 也可以手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contributions via GraphQL
        env:
          GH_TOKEN: ${{ secrets.CONTRIB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, datetime

          token = os.environ["GH_TOKEN"]
          username = "eattt-wen"

          # 过去一年的起止时间
          end   = datetime.datetime.utcnow()
          start = end - datetime.timedelta(days=365)

          query = """
          query($login: String!, $from: DateTime!, $to: DateTime!) {
            user(login: $login) {
              contributionsCollection(from: $from, to: $to) {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          """

          variables = {
            "login": username,
            "from":  start.strftime("%Y-%m-%dT00:00:00Z"),
            "to":    end.strftime("%Y-%m-%dT23:59:59Z"),
          }

          payload = json.dumps({"query": query, "variables": variables}).encode()
          req = urllib.request.Request(
            "https://api.github.com/graphql",
            data=payload,
            headers={
              "Authorization": f"bearer {token}",
              "Content-Type":  "application/json",
            }
          )

          with urllib.request.urlopen(req) as resp:
            data = json.load(resp)

          cal   = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]
          total = cal["totalContributions"]
          weeks = cal["weeks"]

          # 展平成 [{date, count}, ...] 列表
          days = []
          for w in weeks:
            for d in w["contributionDays"]:
              days.append({"date": d["date"], "count": d["contributionCount"]})

          output = {"total": total, "days": days, "updated": end.strftime("%Y-%m-%d")}

          os.makedirs("data", exist_ok=True)
          with open("data/contrib.json", "w") as f:
            json.dump(output, f)

          print(f"Done: {total} contributions, {len(days)} days written.")
          EOF

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contrib.json
          git diff --cached --quiet || git commit -m "chore: update contribution data [skip ci]"
          git push